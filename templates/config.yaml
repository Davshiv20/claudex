host: "127.0.0.1"
port: 8317

tls:
  enable: false
  cert: ""
  key: ""

remote-management:
  allow-remote: false
  secret-key: ""
  disable-control-panel: false
  panel-github-repository: "https://github.com/router-for-me/Cli-Proxy-API-Management-Center"

auth-dir: "__CLIPROXY_CONFIG_DIR__"

api-keys:
  - "__CLAUDEX_API_KEY__"

debug: false
# Disabled by default so no usage data leaves your machine. Set to true to opt in.
usage-statistics-enabled: false
request-retry: 3
max-retry-credentials: 0
max-retry-interval: 30

quota-exceeded:
  switch-project: true
  switch-preview-model: true

routing:
  strategy: "round-robin"
