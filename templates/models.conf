# claudex model map
# =============================================================================
# Claude Code only has THREE model slots: Opus, Sonnet, Haiku.
# This file decides which real model powers each slot. Edit the values below.
#
#   SLOT = model-name(effort)
#
#   - effort is OPTIONAL and can be:  high | medium | low
#         (it controls how hard the model "thinks" — higher = slower + smarter)
#   - You do NOT need quotes, even with the parentheses.
#
# Easiest way to change these — the guided picker (choose by number/search):
#   claudex-models set             # walk through Opus, Sonnet, Haiku
#   claudex-models set opus        # re-pick a single slot
#
# Other handy commands:
#   claudex-models list            # every model your account can actually use
#   claudex-models show            # what each slot maps to right now
#   claudex-models set opus <model># set a slot directly, no prompts
#   claudex-models edit            # open this file in your editor
#
# One-off override (doesn't change this file):
#   CLAUDEX_OPUS_MODEL='gpt-5.5(high)' claudex
# =============================================================================

# Most capable slot. Claude Code labels this "Opus". Use it for hard tasks.
OPUS = gpt-5-codex(high)

# Balanced everyday slot ("Sonnet"). This is usually your default.
SONNET = gpt-5-codex(medium)

# Fast / cheap slot ("Haiku"). Used for quick + background work.
HAIKU = gpt-5-codex(low)
