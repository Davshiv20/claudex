name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install shellcheck (Linux)
        if: runner.os == 'Linux'
        run: |
          if ! command -v shellcheck >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y shellcheck
          fi
          shellcheck --version

      - name: Install shellcheck (macOS)
        if: runner.os == 'macOS'
        run: |
          if ! command -v shellcheck >/dev/null 2>&1; then
            brew install shellcheck
          fi
          shellcheck --version

      - name: Show tool versions
        run: |
          bash --version | head -1
          python3 --version
          curl --version | head -1

      - name: Run test suite
        run: bash tests/run.sh
